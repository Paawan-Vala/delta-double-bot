name: Double Bot (PMCC+PMCP)

# Free, no-card 24/7 deployment of the live double-diagonal bot.
# Runs one decision cycle on a schedule and commits the position state back to
# the repo so it persists between runs (Actions runners are ephemeral).

on:
  schedule:
    # Hourly at :25 UTC. Note: GitHub cron is best-effort and can be delayed a
    # few minutes under load — fine here, the bot reconciles/heals each run.
    - cron: "25 * * * *"
  workflow_dispatch: {}   # adds a manual "Run workflow" button

# Never let two cycles run at once (prevents double-trading on overlap).
concurrency:
  group: double-bot
  cancel-in-progress: false

permissions:
  contents: write   # allows committing the updated state file back

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with committed position state)
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: live/requirements-live.txt

      - name: Install runtime dependencies
        run: pip install -r live/requirements-live.txt

      - name: Write .ENV from repository secrets
        run: |
          {
            echo "API_KEY_SECOND=${{ secrets.DELTA_API_KEY_SECOND }}"
            echo "API_SECRET_SECOND=${{ secrets.DELTA_API_SECRET_SECOND }}"
          } > .ENV

      - name: Run one decision cycle (account 2, testnet)
        run: >-
          python -m live.runner_double
          --execute --contracts 1 --leverage 3 --margin-mode cross

      - name: Persist position state back to the repo
        if: always()
        run: |
          rm -f .ENV
          if [[ -n "$(git status --porcelain live/state/double_position.json)" ]]; then
            git config user.name "double-bot"
            git config user.email "double-bot@users.noreply.github.com"
            git add live/state/double_position.json
            git commit -m "state: position update $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
            git push
          else
            echo "No state change this cycle."
          fi
